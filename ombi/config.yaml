arch:
  - aarch64
  - amd64
description:
  Self-hosted Plex, Emby, and Jellyfin request and user management system
image: ghcr.io/wheemer/ombi-addon
ingress: true
ingress_port: 3579
ingress_panel: true
ingress_stream: true
init: false
map:
  - addon_config:rw
  - homeassistant_config:ro
name: Ombi
options:
  env_vars: []
  ingress_disabled: false
  PGID: 0
  PUID: 0
panel_icon: mdi:movie-search
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  ingress_disabled: bool
  PGID: int
  PUID: int
slug: ombi
url: https://github.com/Wheemer/ombi-addon/tree/master/ombi
version: "4.60.6"
