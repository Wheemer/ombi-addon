# yamllint disable rule:line-length
---
name: Update Ombi

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

jobs:
  update:
    if: ${{ github.repository_owner == 'Wheemer' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install PyYAML
        run: python3 -m pip install --disable-pip-version-check pyyaml

      - name: Check Ombi release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/update_ombi.py

      - name: Commit update
        run: |
          set -euo pipefail

          if git diff --quiet -- ombi/config.yaml ombi/updater.json ombi/CHANGELOG.md; then
            echo "No Ombi update found."
            exit 0
          fi

          version=$(python3 - <<'PY'
          import yaml
          from pathlib import Path
          print(yaml.safe_load(Path("ombi/config.yaml").read_text())["version"])
          PY
          )

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ombi/config.yaml ombi/updater.json ombi/CHANGELOG.md
          git commit -m "Update Ombi to ${version}"
          git push
